<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- User Avatar Template -->
  <defs>
    <linearGradient id="avatarGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="95" fill="url(#avatarGrad)"/>
  
  <!-- Head -->
  <circle cx="100" cy="70" r="20" fill="#fff"/>
  
  <!-- Body -->
  <ellipse cx="100" cy="125" rx="28" ry="35" fill="#fff"/>
  
  <!-- Initials placeholder -->
  <text x="100" y="105" font-size="32" font-weight="bold" text-anchor="middle" fill="url(#avatarGrad)">J</text>
</svg>