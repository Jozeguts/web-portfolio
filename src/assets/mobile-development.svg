<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Mobile Development Illustration -->
  <defs>
    <linearGradient id="mobileGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9a9b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b6d;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Phone Body -->
  <rect x="60" y="30" width="80" height="140" rx="8" fill="url(#mobileGrad)" stroke="#ff3d3f" stroke-width="2"/>
  
  <!-- Phone Screen -->
  <rect x="68" y="42" width="64" height="110" rx="4" fill="#1a1a2e"/>
  
  <!-- Screen Content -->
  <rect x="72" y="50" width="20" height="20" rx="3" fill="#b9d9ff"/>
  <rect x="100" y="50" width="28" height="5" rx="2.5" fill="#b9d9ff" opacity="0.8"/>
  <rect x="100" y="58" width="28" height="5" rx="2.5" fill="#b9d9ff" opacity="0.6"/>
  
  <rect x="72" y="75" width="56" height="3" rx="1.5" fill="#7bb9ff" opacity="0.5"/>
  <rect x="72" y="82" width="50" height="3" rx="1.5" fill="#7bb9ff" opacity="0.5"/>
  <rect x="72" y="89" width="56" height="3" rx="1.5" fill="#7bb9ff" opacity="0.5"/>
  
  <rect x="72" y="105" width="30" height="8" rx="2" fill="#ff9a9b"/>
  
  <!-- Home Button -->
  <circle cx="100" cy="160" r="5" fill="#999"/>
</svg>