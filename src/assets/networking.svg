<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Networking Illustration -->
  <defs>
    <linearGradient id="networkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd89b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffb347;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Central Node -->
  <circle cx="100" cy="100" r="12" fill="url(#networkGrad)" stroke="#ffb347" stroke-width="2"/>
  
  <!-- Connected Nodes -->
  <circle cx="60" cy="70" r="8" fill="#ffb347" opacity="0.8"/>
  <circle cx="140" cy="70" r="8" fill="#ffb347" opacity="0.8"/>
  <circle cx="50" cy="130" r="8" fill="#ffb347" opacity="0.8"/>
  <circle cx="150" cy="130" r="8" fill="#ffb347" opacity="0.8"/>
  
  <!-- Connection Lines -->
  <line x1="100" y1="100" x2="60" y2="70" stroke="#ffb347" stroke-width="2" opacity="0.5"/>
  <line x1="100" y1="100" x2="140" y2="70" stroke="#ffb347" stroke-width="2" opacity="0.5"/>
  <line x1="100" y1="100" x2="50" y2="130" stroke="#ffb347" stroke-width="2" opacity="0.5"/>
  <line x1="100" y1="100" x2="150" y2="130" stroke="#ffb347" stroke-width="2" opacity="0.5"/>
  
  <!-- Radiating waves for network signal -->
  <circle cx="100" cy="100" r="25" fill="none" stroke="#ffb347" stroke-width="1" opacity="0.3"/>
  <circle cx="100" cy="100" r="40" fill="none" stroke="#ffb347" stroke-width="1" opacity="0.2"/>
</svg>