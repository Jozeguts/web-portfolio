<svg viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="heroBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1e3a8a;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Base gradient -->
  <rect width="1000" height="600" fill="url(#heroBg)"/>
  
  <!-- Geometric shapes for visual interest -->
  <circle cx="150" cy="100" r="80" fill="#3b82f6" opacity="0.1" filter="url(#glow)"/>
  <circle cx="850" cy="500" r="120" fill="#8b5cf6" opacity="0.1" filter="url(#glow)"/>
  <rect x="600" y="50" width="200" height="200" fill="#06b6d4" opacity="0.05" transform="rotate(45 700 150)"/>
  
  <!-- Grid pattern -->
  <g stroke="#3b82f6" stroke-width="1" opacity="0.1">
    <!-- Horizontal lines -->
    <line x1="0" y1="150" x2="1000" y2="150"/>
    <line x1="0" y1="300" x2="1000" y2="300"/>
    <line x1="0" y1="450" x2="1000" y2="450"/>
    
    <!-- Vertical lines -->
    <line x1="250" y1="0" x2="250" y2="600"/>
    <line x1="500" y1="0" x2="500" y2="600"/>
    <line x1="750" y1="0" x2="750" y2="600"/>
  </g>
  
  <!-- Accent dots -->
  <g fill="#3b82f6" opacity="0.2">
    <circle cx="100" cy="200" r="3"/>
    <circle cx="300" cy="150" r="3"/>
    <circle cx="900" cy="250" r="3"/>
    <circle cx="700" cy="400" r="3"/>
    <circle cx="200" cy="500" r="3"/>
  </g>
</svg>